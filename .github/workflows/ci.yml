  build-macos:
    name: Build for macOS (aarch64)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install Dependencies
      run: |
        brew update
        brew install cmake \
          dylibbundler \
          jpeg-turbo \
          libogg \
          libopenmpt \
          libpng \
          libvorbis \
          mpg123 \
          ninja \
          sdl2

    - name: Build PvZ-Portable
      run: |
        mkdir build
        cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build

        mkdir -p dist
        mkdir -p dist/libs
        cp build/pvz-portable dist/
        strip -x dist/pvz-portable

        echo "Bundling dependencies..."
        dylibbundler -of -b -x dist/pvz-portable -d dist/libs -p @executable_path/libs/

        codesign --force --deep -s - dist/pvz-portable

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-macos
        path: dist/

  build-android:
    name: Build for Android (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        # Use the latest NDK available on the runner
        if [ -n "$ANDROID_NDK_LATEST_HOME" ] && [ -d "$ANDROID_NDK_LATEST_HOME" ]; then
          echo "ANDROID_NDK=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "Using pre-installed NDK: $ANDROID_NDK_LATEST_HOME"
        else
          # Fallback: install via sdkmanager
          yes | sdkmanager --install "ndk;$(sdkmanager --list 2>/dev/null | grep -oP 'ndk;\K[\d.]+' | sort -V | tail -1)" || true
          NDK_DIR=$(ls -d "$ANDROID_HOME"/ndk/*/ 2>/dev/null | sort -V | tail -1)
          echo "ANDROID_NDK=${NDK_DIR%/}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${NDK_DIR%/}" >> "$GITHUB_ENV"
        fi

    - name: Download SDL2 Source
      run: |
        SDL2_TAG=$(git ls-remote --tags https://github.com/libsdl-org/SDL.git 'refs/tags/release-2.*' \
          | sed 's|.*refs/tags/release-||' | sort -V | tail -1)
        if [ -z "$SDL2_TAG" ]; then
          SDL2_TAG="2.32.10" # Fallback to a known stable version if tag retrieval fails
        fi
        echo "Using SDL2 version: $SDL2_TAG"
        wget -q "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_TAG}/SDL2-${SDL2_TAG}.tar.gz"
        tar xf "SDL2-${SDL2_TAG}.tar.gz"
        mv "SDL2-${SDL2_TAG}" sdl2-src

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: vcpkg.json

    - name: Build SDL2 Shared Library
      run: |
        # On Android, SDL2 MUST be a shared library because the Java-side
        # SDLActivity loads it via System.loadLibrary("SDL2").
        cmake -B build-sdl2 \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-28 \
          -DSDL_SHARED=ON \
          -DSDL_STATIC=OFF \
          -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/sdl2-android \
          -DCMAKE_BUILD_TYPE=Release \
          sdl2-src
        cmake --build build-sdl2 -j$(nproc)
        cmake --install build-sdl2

    - name: Build Native Library with CMake
      run: |
        ABI=arm64-v8a
        ANDROID_API=28
        BUILD_DIR=build-android-$ABI
        SDL2_PREFIX=$GITHUB_WORKSPACE/sdl2-android

        cmake -B $BUILD_DIR \
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=arm64-android \
          -DVCPKG_CMAKE_SYSTEM_VERSION=$ANDROID_API \
          -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=$ABI \
          -DANDROID_PLATFORM=android-$ANDROID_API \
          -DSDL2_DIR=$SDL2_PREFIX/lib/cmake/SDL2 \
          -DCMAKE_BUILD_TYPE=Release

        cmake --build $BUILD_DIR -j$(nproc)

        # Collect all shared libraries into jniLibs for Gradle to package
        JNILIBS=android/app/src/main/jniLibs/$ABI
        mkdir -p $JNILIBS
        cp -L $BUILD_DIR/libmain.so $JNILIBS/

        # Copy SDL2 shared library
        cp -L $SDL2_PREFIX/lib/libSDL2*.so $JNILIBS/

        # Copy any .so dependencies from vcpkg (manifest mode installs into build dir)
        VCPKG_LIB=$BUILD_DIR/vcpkg_installed/arm64-android/lib
        for so in "$VCPKG_LIB"/*.so; do
          [ -f "$so" ] && cp -L "$so" $JNILIBS/
        done

        # Strip debug symbols to reduce APK size
        STRIP=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
        for so in "$JNILIBS"/*.so; do
          "$STRIP" --strip-unneeded "$so"
        done

        echo "Collected .so files:"
        ls -lh $JNILIBS/

    - name: Build APK with Gradle
      run: |
        cd android
        echo "sdk.dir=$ANDROID_HOME" > local.properties

        # Use gradle wrapper; package pre-built native libraries into a release APK (debug-signed)
        gradle wrapper
        ./gradlew assembleRelease -PusePrebuiltLibs=true --no-daemon

    - name: Copy APK
      run: |
        mkdir -p dist
        find android -name "*.apk" -path "*/release/*" -exec cp {} dist/pvz-portable-android-arm64-v8a.apk \;

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-android
        path: dist/

  build-ios:
    name: Build for iOS (arm64)
    runs-on: macos-latest
    env:
      IOS_DEPLOY_TARGET: "15.0"
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: vcpkg.json

    - name: Build PvZ-Portable for iOS
      run: |
        BUILD_DIR=build-ios

        cmake -B $BUILD_DIR \
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=arm64-ios \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=$IOS_DEPLOY_TARGET \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_BUILD_TYPE=Release \
          -G Xcode

        cmake --build $BUILD_DIR --config Release -- \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_ALLOWED=NO

    - name: Create unsigned IPA
      run: |
        APP_PATH=$(find build-ios -name "pvz-portable.app" -path "*Release*" | head -1)
        mkdir -p dist/Payload
        cp -R "$APP_PATH" dist/Payload/
        cd dist
        zip -r -y pvz-portable-ios-arm64.ipa Payload/
        rm -rf Payload

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-ios
        path: dist/

  build-wasm:
    name: Build for WebAssembly (Emscripten)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - name: Build libopenmpt for Emscripten
      run: |
        SYSROOT="$(em-config EMSCRIPTEN_ROOT)/cache/sysroot"
        OPENMPT_TAG=$(git ls-remote --tags https://github.com/OpenMPT/openmpt.git 'refs/tags/libopenmpt-*' \
          | grep -v '\^{}' | sed 's|.*refs/tags/libopenmpt-||' \
          | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
        if [ -z "$OPENMPT_TAG" ]; then
          OPENMPT_TAG="0.8.4" # Fallback to a known stable version if tag retrieval fails
        fi
        echo "Using libopenmpt version: $OPENMPT_TAG"
        git clone --depth=1 --branch "libopenmpt-${OPENMPT_TAG}" https://github.com/OpenMPT/openmpt.git /tmp/libopenmpt-src
        cd /tmp/libopenmpt-src
        emmake make CONFIG=emscripten \
          STATIC_LIB=1 SHARED_LIB=0 \
          EXAMPLES=0 OPENMPT123=0 TEST=0 \
          NO_ZLIB=1 NO_MPG123=1 NO_OGG=1 NO_VORBIS=1 NO_VORBISFILE=1 \
          NO_PORTAUDIO=1 NO_PORTAUDIOCPP=1 NO_PULSEAUDIO=1 \
          NO_SDL2=1 NO_FLAC=1 NO_SNDFILE=1 \
          -j$(nproc)
        emmake make CONFIG=emscripten \
          STATIC_LIB=1 SHARED_LIB=0 \
          EXAMPLES=0 OPENMPT123=0 TEST=0 \
          PREFIX="${SYSROOT}" install

    - name: Build PvZ-Portable for WebAssembly
      run: |
        mkdir build-wasm
        emcmake cmake -G Ninja -B build-wasm -DCMAKE_BUILD_TYPE=Release
        cmake --build build-wasm -j$(nproc)

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-wasm
        path: |
          build-wasm/pvz-portable.html
          build-wasm/pvz-portable.js
          build-wasm/pvz-portable.wasm

  release:
    name: Release
    needs: ['build-archlinux', 'build-windows-msys2-ucrt64', 'build-windows-msvc-x64', 'build-macos', 'build-android', 'build-ios', 'build-wasm']
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare Release Files
      run: |
        mkdir release_files

        echo "Preparing Arch Linux file..."
        chmod +x artifacts/pvz-portable-archlinux/pvz-portable
        mv artifacts/pvz-portable-archlinux/pvz-portable release_files/pvz-portable-archlinux-x86_64

        echo "Preparing Windows MSVC file..."
        mv artifacts/pvz-portable-windows-msvc-x64/pvz-portable.exe release_files/pvz-portable-windows-msvc-x64-static.exe

        echo "Preparing Windows MSYS2 file..."
        mv artifacts/pvz-portable-windows-msys2-ucrt64/pvz-portable.exe release_files/pvz-portable-windows-ucrt64-static.exe

        echo "Preparing macOS file..."
        cd artifacts/pvz-portable-macos
        chmod +x pvz-portable
        zip -r -y ../../release_files/pvz-portable-macos-aarch64.zip .
        cd ../..

        echo "Preparing Android file..."
        mv artifacts/pvz-portable-android/pvz-portable-android-arm64-v8a.apk release_files/pvz-portable-android-arm64-v8a.apk

        echo "Preparing iOS file..."
        mv artifacts/pvz-portable-ios/pvz-portable-ios-arm64.ipa release_files/pvz-portable-ios-arm64.ipa

        echo "Preparing WebAssembly file..."
        cd artifacts/pvz-portable-wasm
        zip -r ../../release_files/pvz-portable-wasm.zip .
        cd ../..

        echo "Final files:"
        ls -lh release_files/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release_files/*
        generate_release_notes: true
        draft: false
        prerelease: false

  aur-publish:
    name: Publish to AUR
    needs: release
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    env:
      AUR_PACKAGE: pvz-portable
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git openssh

      - name: Create build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure SSH for AUR
        run: |
          mkdir -p /root/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > /root/.ssh/aur
          chmod 600 /root/.ssh/aur
          cat > /root/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile /root/.ssh/aur
            User aur
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 /root/.ssh/config

      - name: Update PKGBUILD version and checksums
        run: |
          git config --global --add safe.directory '*'
          mkdir -p /tmp/aur-build
          cp archlinux/PKGBUILD-AUR /tmp/aur-build/PKGBUILD
          TAG_VERSION="${{ github.ref_name }}"
          PKGVER="${TAG_VERSION#v}"
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" /tmp/aur-build/PKGBUILD
          echo "Updated pkgver to ${PKGVER}"

          GIT_CHECKSUM=$(git -c core.abbrev=no archive --format tar "${TAG_VERSION}" | sha256sum | cut -d' ' -f1)
          echo "Computed git archive checksum: ${GIT_CHECKSUM}"

          sed -i "0,/SKIP/{s/SKIP/${GIT_CHECKSUM}/}" /tmp/aur-build/PKGBUILD
          echo "Updated sha256sums"

          chown -R builder:builder /tmp/aur-build

      - name: Generate .SRCINFO
        run: |
          su builder -c 'cd /tmp/aur-build && makepkg --printsrcinfo' > /tmp/aur-build/.SRCINFO
          echo "Generated .SRCINFO:"
          cat /tmp/aur-build/.SRCINFO

      - name: Push to AUR
        run: |
          git config --global user.name "${{ secrets.AUR_USERNAME }}"
          git config --global user.email "${{ secrets.AUR_EMAIL }}"

          git clone ssh://aur@aur.archlinux.org/${AUR_PACKAGE}.git /tmp/aur-repo || {
            mkdir -p /tmp/aur-repo
            cd /tmp/aur-repo
            git init
            git remote add origin ssh://aur@aur.archlinux.org/${AUR_PACKAGE}.git
          }

          cd /tmp/aur-repo

          cp /tmp/aur-build/PKGBUILD .
          cp /tmp/aur-build/.SRCINFO .

          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to push"
          else
            git commit -m "Update to ${{ github.ref_name }}"
            git push origin master
          fi
